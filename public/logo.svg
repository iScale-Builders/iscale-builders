<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">iScaleBuilders</title>
  <desc id="desc">A luminous orbital monogram for the iScaleBuilders AI foundry.</desc>
  <defs>
    <linearGradient id="tile" x1="8" x2="58" y1="7" y2="59" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4D4D4"/>
      <stop offset="0.46" stop-color="#8A8A8A"/>
      <stop offset="1" stop-color="#525252"/>
    </linearGradient>
    <linearGradient id="core" x1="19" x2="45" y1="16" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFAFA"/>
      <stop offset="0.52" stop-color="#D4D4D4"/>
      <stop offset="1" stop-color="#A3A3A3"/>
    </linearGradient>
    <radialGradient id="glass" cx="0" cy="0" r="1" gradientTransform="matrix(30 32 -32 30 20 13)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.62"/>
      <stop offset="0.34" stop-color="#A3A3A3" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0.84"/>
    </radialGradient>
    <filter id="glow" x="-32" y="-32" width="128" height="128" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.85 0 0 0 0 0.85 0 0 0 0 0.85 0 0 0 0.45 0" result="greyGlow"/>
      <feMerge>
        <feMergeNode in="greyGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="4.5" y="4.5" width="55" height="55" rx="16" fill="#0A0A0A"/>
  <rect x="5.5" y="5.5" width="53" height="53" rx="15" fill="url(#glass)" stroke="url(#tile)" stroke-width="1.4"/>
  <path d="M14.4 33.8c5.5-10.3 15.8-16.5 27.2-16.4 4.2 0 8.2.9 11.8 2.5" fill="none" stroke="#B3B3B3" stroke-width="1.5" stroke-linecap="round" opacity="0.72"/>
  <path d="M49.5 30.7c-5 10.3-15 16.6-26.5 16.6-4.5 0-8.8-1-12.7-2.9" fill="none" stroke="#8A8A8A" stroke-width="1.5" stroke-linecap="round" opacity="0.74"/>
  <g filter="url(#glow)">
    <circle cx="32" cy="32" r="15.4" fill="#0A0A0A" stroke="url(#tile)" stroke-width="1.6"/>
    <circle cx="32" cy="32" r="10.2" fill="none" stroke="#D4D4D4" stroke-width="0.8" opacity="0.42" stroke-dasharray="1.2 2.4"/>
    <text x="32" y="32.5" text-anchor="middle" dominant-baseline="central" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="22" letter-spacing="-1" fill="url(#core)">iS</text>
  </g>
  <circle cx="50.8" cy="20.2" r="2.2" fill="#FAFAFA"/>
  <circle cx="13.9" cy="44.5" r="1.6" fill="#A3A3A3"/>
</svg>
